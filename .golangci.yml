linters:
  enable:
    # Correctness
    - errcheck
    - govet
    - staticcheck
    - unused
    - gosimple
    - ineffassign
    # Style & quality
    - gocritic
    - revive
    - misspell
    - prealloc
    # Security
    - gosec
    - bodyclose
    - sqlclosecheck

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  gosec:
    excludes:
      # Example: exclude specific rules if needed
      # - G104  # unhandled errors (covered by errcheck)
    severity: medium
    confidence: medium

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0

severity:
  default-severity: warning
  rules:
    - linters:
        - gosec
      severity: error
