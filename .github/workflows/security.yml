name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6am UTC

permissions:
  contents: read
  security-events: write # For SARIF uploads

jobs:
  govulncheck:
    name: Go Vulnerability Check
    runs-on: ubuntu-latest
    continue-on-error: true # stdlib vulns may not have fixes in go1.24.x (EOL)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    name: Static Security Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'
      - name: Run gosec
        uses: securego/gosec@master
        with:
          args: '-no-fail -fmt sarif -out gosec.sarif ./...'
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: gosec.sarif
      - name: Fail on findings
        run: |
          # Re-run to get exit code (SARIF run above uses -no-fail)
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...

  golangci-lint:
    name: Security Linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  nancy:
    name: Dependency CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.13'
      - name: Install nancy
        run: go install github.com/sonatype-nexus-community/nancy@latest
      - name: Run nancy
        run: go list -json -m all | nancy sleuth

  trivy:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy.sarif
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy.sarif

  # Gate job — fails the PR if any scanner fails
  security-gate:
    name: Security Gate
    needs: [govulncheck, gosec, golangci-lint, nancy, trivy]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.gosec.result }}" != "success" ] || \
             [ "${{ needs.golangci-lint.result }}" != "success" ] || \
             [ "${{ needs.nancy.result }}" != "success" ] || \
             [ "${{ needs.trivy.result }}" != "success" ]; then
            echo "::error::One or more security scans failed"
            exit 1
          fi
          if [ "${{ needs.govulncheck.result }}" != "success" ]; then
            echo "::warning::govulncheck reported findings (may be unfixed stdlib vulns)"
          fi
          echo "Security scans completed"
